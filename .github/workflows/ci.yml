name: Public worker CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  unit:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.10"
          cache: pip
      - name: Install test dependencies
        run: python -m pip install curl-cffi==0.15.0 pycryptodome==3.23.0 PyNaCl==1.6.2 requests==2.34.2 zstandard==0.25.0
      - name: Run unit and boundary tests
        run: |
          python -m unittest discover -s tests -p 'test_*.py'
          python scripts/check_text_encoding.py
          python scripts/check_public_boundary.py
          python scripts/check_markdown_links.py
          if [ -f worker-mirror.manifest.json ]; then
            python scripts/check_generated_mirror.py --root . --trusted-root worker-mirror-root.json
          fi
          python -m compileall -q courselens_worker shared scripts

  gitleaks:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7
        env:
          GITHUB_TOKEN: ${{ github.token }}

  protocol:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.10"
      - name: Install protocol dependencies
        run: python -m pip install PyNaCl==1.6.2 zstandard==0.25.0
      - name: Run shared protocol contract
        run: |
          python -m unittest discover -s tests -p 'test_protocol.py' -q
          if [ -f worker-mirror.manifest.json ]; then
            python scripts/check_generated_mirror.py --root . --trusted-root worker-mirror-root.json
          fi

  boundary:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.10"
      - name: Scan current tree and public history
        run: |
          python scripts/check_text_encoding.py
          python scripts/check_public_boundary.py
          python scripts/check_markdown_links.py
          python -m compileall -q courselens_worker shared scripts
