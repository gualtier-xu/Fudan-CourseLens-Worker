name: Encrypted channel echo
run-name: CourseLens echo ${{ inputs.task_id }}

on:
  workflow_dispatch:
    inputs:
      task_id:
        description: Opaque 32-character job identifier
        required: true
        type: string
      protocol_version:
        description: Encrypted job protocol version
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: courselens-echo-${{ inputs.task_id }}
  cancel-in-progress: false

jobs:
  echo:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    environment: courselens-worker
    env:
      COURSELENS_TASK_ID: ${{ inputs.task_id }}
      COURSELENS_PROTOCOL_VERSION: ${{ inputs.protocol_version }}
      PRIVATE_JOB_REPO: gualtier-xu/Fudan-CourseLens-Private
      PRIVATE_JOB_REPO_TOKEN: ${{ secrets.PRIVATE_JOB_REPO_TOKEN }}
      WORKER_INPUT_PRIVATE_KEY: ${{ secrets.WORKER_INPUT_PRIVATE_KEY }}
      WORKER_SIGNING_PRIVATE_KEY: ${{ secrets.WORKER_SIGNING_PRIVATE_KEY }}
      COURSELENS_RESULT_PATH: ${{ github.workspace }}/result.box.json
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.10"
          cache: pip
      - name: Install minimal encrypted-channel runtime
        run: python -m pip install PyNaCl==1.6.2 requests==2.34.2 zstandard==0.25.0
      - name: Process encrypted echo
        run: python -m courselens_worker
      - name: Upload encrypted echo result
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: courselens-result-${{ inputs.task_id }}
          path: result.box.json
          if-no-files-found: error
          retention-days: 1
          compression-level: 0
      - name: Remove transient data
        if: always()
        run: |
          rm -f result.box.json
          rm -rf .work
