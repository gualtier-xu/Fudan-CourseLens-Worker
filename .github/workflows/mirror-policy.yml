name: Generated mirror policy

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: read

jobs:
  mirror-policy:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Require protected publisher identity and branch
        env:
          EXPECTED_APP: ${{ vars.WORKER_MIRROR_APP_SLUG }}
          AUTHOR: ${{ github.event.pull_request.user.login }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
        run: |
          test -n "${EXPECTED_APP}"
          test "${AUTHOR}" = "${EXPECTED_APP}[bot]"
          test "${HEAD_REPO}" = "${GITHUB_REPOSITORY}"
          case "${HEAD_REF}" in
            codex/monorepo-worker-mirror|generated/worker-mirror-*) ;;
            *) exit 1 ;;
          esac
      - name: Check out trusted validator from public main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: trusted
          persist-credentials: false
      - name: Check out untrusted generated snapshot as data
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: candidate
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.10"
      - name: Install validator dependencies
        run: python -m pip install PyNaCl==1.6.2 zstandard==0.25.0
      - name: Verify signature and generated boundary with base code
        env:
          PYTHONPATH: ${{ github.workspace }}/trusted
        run: >-
          python trusted/scripts/check_generated_mirror.py
          --root candidate
          --trusted-root trusted/worker-mirror-root.json

